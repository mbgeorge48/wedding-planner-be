<div class="flex flex-col space-y-1">
    {% if label %}
        <label for="{{ name }}"
               class="text-xs font-semibold text-emerald-900 uppercase tracking-widest">{{ label }}</label>
    {% endif %}
    <input id="{{ name }}"
           name="{{ name }}"
           type="{{ type|default:'text' }}"
           value="{{ value|default:'' }}"
           class="w-full px-4 py-2 border-b-2 border-emerald-50 focus:outline-none focus:border-amber-600 transition bg-emerald-50/10 text-emerald-900"
           {% if required %}required{% endif %} />
</div>
