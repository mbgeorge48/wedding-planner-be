{% if href %}
    <a href="{{ href }}"
       class="inline-block px-8 py-3 rounded-full bg-amber-600 text-white hover:bg-amber-700 transition duration-300 font-medium text-center uppercase tracking-widest text-xs shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
        {{ text }}
    </a>
{% else %}
    <button type="{{ type|default:'button' }}"
            class="inline-block px-8 py-3 rounded-full bg-amber-600 text-white hover:bg-amber-700 transition duration-300 font-medium text-center uppercase tracking-widest text-xs shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
        {{ text }}
    </button>
{% endif %}
