{% load custom_filters %}
<div class="inline-block px-6 py-8 md:px-12 md:py-14 bg-white/10 backdrop-blur-sm rounded-lg border border-white/20 shadow-2xl relative overflow-hidden group mx-2">
    <!-- Subtle Gold Corner Accents -->
    <div class="absolute top-0 left-0 w-6 h-6 md:w-8 md:h-8 border-t-2 border-l-2 border-amber-600/50"></div>
    <div class="absolute bottom-0 right-0 w-6 h-6 md:w-8 md:h-8 border-b-2 border-r-2 border-amber-600/50"></div>
    <div class="relative z-10">
        <h1 class="font-serif text-white text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-medium mb-2 tracking-tight leading-tight">
            {{ groom }} <span class="text-amber-400 font-light italic">&</span> {{ bride }}
        </h1>
        <p class="text-amber-200/90 text-lg md:text-2xl font-serif italic mb-6 tracking-wide">are getting married</p>
        <div class="inline-block px-4 py-1 border-y border-white/30 font-sans text-white text-xs md:text-base uppercase tracking-[0.2em] md:tracking-[0.3em] font-light">
            {{ date|ordinal_date }}
        </div>
    </div>
</div>
