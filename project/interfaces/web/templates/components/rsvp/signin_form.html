{% load button_tag %}
<div class="w-full max-w-md mx-auto animate-fade-in">
    <div class="overflow-hidden bg-white border rounded-lg shadow-2xl border-emerald-100/50">
        <div class="px-8 py-10 text-center text-white border-b-4 bg-emerald-900 border-amber-600">
            <h2 class="mb-2 text-4xl italic font-light tracking-widest uppercase">RSVP</h2>
            <p class="text-amber-200/80 text-xs uppercase tracking-[0.2em] font-sans font-semibold">Find your invitation</p>
        </div>
        <div class="p-8 bg-white md:p-12">
            <form method="post" class="space-y-8">
                {% csrf_token %}
                <div class="space-y-6">
                    <div class="flex flex-col space-y-2">
                        <label for="firstname"
                               class="text-xs font-semibold tracking-widest uppercase text-emerald-900">
                            First Name
                        </label>
                        <input id="firstname"
                               name="firstname"
                               type="text"
                               value="{{ prefill.firstname }}"
                               required
                               class="w-full px-4 py-3 text-lg italic transition border-b-2 border-emerald-50 focus:outline-none focus:border-amber-600 bg-emerald-50/10 text-emerald-900"
                               placeholder="e.g. Eleri" />
                    </div>
                    <div class="flex flex-col space-y-2">
                        <label for="code"
                               class="text-xs font-semibold tracking-widest uppercase text-emerald-900">
                            Invite Code
                        </label>
                        <input id="code"
                               name="code"
                               type="text"
                               value="{{ prefill.code }}"
                               maxlength="10"
                               required
                               class="w-full px-4 py-3 border-b-2 border-emerald-50 focus:outline-none focus:border-amber-600 transition bg-emerald-50/10 text-lg tracking-[0.3em] text-emerald-900 uppercase"
                               placeholder="XXXXXX" />
                        <p class="text-[10px] text-neutral-400 italic">Check your invitation for your unique code.</p>
                    </div>
                </div>
                {% if error %}
                    <div class="p-3 text-xs italic text-center text-red-600 border border-red-100 rounded bg-red-50 animate-pulse">
                        {{ error }}
                    </div>
                {% endif %}
                <div class="flex justify-center pt-4">{% button text="Continue" type="submit" %}</div>
            </form>
        </div>
    </div>
</div>
