{% if group_members %}
    <div class="w-full max-w-4xl mx-auto mb-8 animate-fade-in">
        <div class="p-6 bg-white border shadow-sm border-emerald-100 rounded-xl">
            <h3 class="mb-4 font-serif text-lg text-emerald-900">Other members of your group:</h3>
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3 md:gap-4">
                {% for member in group_members %}
                    <div class="flex items-center justify-between p-4 transition-colors border rounded-lg bg-emerald-50/50 border-emerald-100 group hover:border-amber-500">
                        <div class="flex flex-col">
                            <span class="font-serif text-emerald-900">{{ member.firstname }}</span>
                            <span class="text-xs text-neutral-400">
                                {% if member.rsvp %}
                                    RSVP'd
                                {% else %}
                                    Pending
                                {% endif %}
                            </span>
                        </div>
                        <form method="post" action="{% url 'rsvp_switch' %}">
                            {% csrf_token %}
                            <input type="hidden" name="guest_id" value="{{ member.id }}">
                            <button type="submit"
                                    class="font-sans text-xs font-bold tracking-widest uppercase transition-colors text-emerald-700 hover:text-amber-700">
                                Switch
                            </button>
                        </form>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
{% endif %}
