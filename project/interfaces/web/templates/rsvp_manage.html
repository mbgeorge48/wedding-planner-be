{% extends "base.html" %}
{% load static %}
{% block title %}
    RSVP Manage
{% endblock title %}
{% block content %}
    <main id="rsvp-manage" class="flex flex-col m-6 items-center font-serif w-full">
        <div class="w-full max-w-6xl">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-gray-800">RSVP Management</h1>
                <div class="flex items-center gap-4">
                    <span class="text-gray-600">Hello, {{ name }}</span>
                    <form method="post" action="{% url 'signout' %}">
                        {% csrf_token %}
                        <button type="submit" class="text-red-600 hover:text-red-800 font-semibold">Sign out</button>
                    </form>
                </div>
            </div>

            <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
                {% include "components/rsvp/rsvp_table.html" with rsvp_data=rsvp_data %}
            </div>
        </div>
    </main>
{% endblock content %}
