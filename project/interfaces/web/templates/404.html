{% extends "base.html" %}
{% load static %}
{% load button_tag %}

{% block title %}Page Not Found - {{ block.super }}{% endblock %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<main class="relative flex items-center justify-center min-h-screen bg-gray-50">
    <div class="container px-4 mx-auto text-center">
        <div class="max-w-xl mx-auto">
            <h1 class="mb-4 font-serif text-6xl font-bold text-emerald-900">404</h1>
            <h2 class="mb-6 font-serif text-3xl font-semibold text-amber-600 italic">Page Not Found</h2>
            <p class="mb-10 text-lg text-gray-600 font-sans">
                The page you are looking for doesn't exist or has been moved.
            </p>
            {% button text="Return Home" url_name="home" %}
        </div>
    </div>
</main>
{% endblock %}
