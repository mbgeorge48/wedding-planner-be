version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=weddingplanner
      - POSTGRES_USER=mg
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

  web:
    build: .
    volumes:
      - .:/app
      - /app/static_root
    ports:
      - "8000:8080"
    environment:
      - DEBUG=True
      - SECRET_KEY=local-dev-key-not-for-prod
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_NAME=weddingplanner
      - DB_USER=mg
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data:
